services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: cognitive_hub_api
    ports:
      - "8000:8000"
    environment:
      - ENV=production
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: cognitive_hub_client
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped